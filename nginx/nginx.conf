user nginx;
worker_processes auto;
worker_priority -5;  # Lower priority for worker processes

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ====== LOGGING ======
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    log_format security '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_x_forwarded_for" '
                        '"$http_user_agent" '
                        'SSL: $ssl_protocol $ssl_cipher';

    access_log /var/log/nginx/access.log main;
    access_log /var/log/nginx/security.log security;

    # ====== PERFORMANCE & SECURITY ======
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 50;
    types_hash_max_size 2048;
    client_max_body_size 10m;  # Prevent large uploads
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ====== SECURITY HEADERS ======
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ====== HIDE NGINX VERSION ======
    server_tokens off;

    # ====== COMPRESSION ======
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_disable "msie6";
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ====== BROTLI COMPRESSION (if available) ======
    # Uncomment if brotli is installed: apt-get install libnginx-mod-http-brotli
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript;

    # ====== RATE LIMITING ======
    # Define zones with IP-based tracking
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=3r/s;

    # ====== CONNECTION LIMITS (DDoS PROTECTION) ======
    # Limit concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    limit_conn_status 429;
    
    # ====== WEBSOCKET PROTOCOL MAPPING ======
    # Map secure (wss) to ws when proxying to http backend
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }
    
    # ====== UPSTREAM BACKEND ======
    upstream host_backend {
        server host.docker.internal:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}