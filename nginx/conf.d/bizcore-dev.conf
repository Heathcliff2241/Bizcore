# ===========================================================
# BizCore Development Nginx Configuration
# For local development with Next.js running on host machine
# Supports both bizcore.test and localhost domains
# ===========================================================

server {
    listen 80;
    server_name bizcore.test localhost 127.0.0.1;

    # Logs
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ====== BRANDSTUDIO DEV SERVER ======
    # Proxy to Vite dev server for hot reload during development
    # Strip /studio prefix when proxying to Vite
    location ^~ /studio/ {
        resolver 127.0.0.11 valid=10s;
        set $vite_server http://host.docker.internal:5174;
        # Do not rewrite path - Vite is configured with base: '/studio/'
        # rewrite ^/studio/(.*)$ /$1 break;
        proxy_pass $vite_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Allow large uploads for file handling
        client_max_body_size 100M;
    }
    
    # Redirect /studio to /studio/ (preserve query string)
    location = /studio {
        return 301 /studio/?$query_string;
    }

    # ====== STATIC FILES ======
    # Serve from Next.js (via proxy) - all _next assets are served by the Next.js app
    location ~ ^/_next/ {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets aggressively
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    
    # Public static files can be served from disk if they exist
    location ~ ^/public/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
        error_page 404 = @fallback;
    }
    
    location @fallback {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ====== API ENDPOINTS (Rate Limited) ======
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ====== AUTH ENDPOINTS ======
    # Note: Rate limiting is handled at the application level (NextAuth + lib/rateLimit.ts)
    # Do not apply nginx-level rate limiting here to avoid conflicts with app-level rate limiting
    location ~ ^/(auth|signin|signup)/ {
        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ====== ALL OTHER REQUESTS ======
    location / {
        limit_req zone=general burst=50 nodelay;

        proxy_pass http://host.docker.internal:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ====== DENY DANGEROUS PATHS ======
    
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(config\.php|xmlrpc\.php|wp-admin|wp-login) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ====== HEALTH CHECK ENDPOINT ======
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}