server {
    listen 80;
    server_name localhost; # or your domain, e.g., bizcore.dev

    # ====== BRANDSTUDIO (static Vite build) ======
    location /brandstudio/ {
        alias /usr/share/nginx/html/brandstudio/;  # matches your docker volume
        index index.html;
        try_files $uri $uri/ /brandstudio/index.html;
        access_log /var/log/nginx/brandstudio.access.log main;
        error_log /var/log/nginx/brandstudio.error.log;
    }

    # ====== NEXT.JS (BizCore platform) ======
    location / {
        proxy_pass http://bizcore_nextjs:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Optional: basic rate limit zones from your main config
        limit_req zone=api burst=20 nodelay;
    }

    # ====== STATIC OPTIMIZATIONS ======
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # ====== ERROR HANDLING ======
    error_page 404 /404.html;
    location = /404.html {
        root /usr/share/nginx/html/brandstudio;
        internal;
    }
}
