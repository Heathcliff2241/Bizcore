app = 'bizcore-v2-broken-wildflower-9754'
primary_region = 'sin'

[build]
  args = { NEXT_PUBLIC_APP_URL = "https://bizcore-v2.fly.dev", NEXTAUTH_URL = "https://bizcore-v2.fly.dev" }

[deploy]
  release_command = 'npx prisma migrate deploy'
