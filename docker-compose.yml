# =============================================
# BizCore BrandStudio – Development Compose Stack
# Database Services + Nginx Reverse Proxy
# =============================================

x-common-healthcheck: &default-health
  interval: 10s
  timeout: 5s
  retries: 5

services:
  # ==========================
  # Nginx Reverse Proxy (Security-Hardened)
  # ==========================
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: bizcore_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./public:/app/public:ro
    tmpfs:
      - /var/cache/nginx
    depends_on:
      - postgres
    networks:
      - bizcore_network
    environment:
      # Allow nginx to access host machine services
      DOCKER_HOST: host.docker.internal
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================
  # PostgreSQL Database
  # ==========================
  postgres:
    image: postgres:15-alpine
    container_name: bizcore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bizcore_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      <<: *default-health
    networks:
      - bizcore_network

  # ==========================
  # PgBouncer Connection Pooler
  # ==========================
  pgbouncer:
    build:
      context: ./pgbouncer
      dockerfile: Dockerfile
    container_name: bizcore_pgbouncer
    restart: unless-stopped
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bizcore_network
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres -h localhost -p 6432 -d bizcore_dev -c 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================
  # pgAdmin (Database GUI) - DISABLED (using Prisma Studio instead)
  # ==========================
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: bizcore_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@bizcore.dev}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - "5050:80"
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - bizcore_network

# ==========================
# VOLUMES
# ==========================
volumes:
  postgres_data:

# ==========================
# NETWORK
# ==========================
networks:
  bizcore_network:
    driver: bridge