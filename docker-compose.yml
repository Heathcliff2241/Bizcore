# =============================================
# BizCore BrandStudio – Development Compose Stack
# Database Services Only (Apps run manually)
# =============================================

x-common-healthcheck: &default-health
  interval: 10s
  timeout: 5s
  retries: 5

services:
  # ==========================
  # PostgreSQL Database
  # ==========================
  postgres:
    image: postgres:15-alpine
    container_name: bizcore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bizcore_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      <<: *default-health
    networks:
      - bizcore_network

  # ==========================
  # PgBouncer Connection Pooler
  # ==========================
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: bizcore_pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:postgres123@postgres:5432/bizcore_dev
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      LISTEN_PORT: 6432
    ports:
      - "6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bizcore_network

  # ==========================
  # pgAdmin (Database GUI)
  # ==========================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bizcore_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bizcore.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bizcore_network

# ==========================
# VOLUMES
# ==========================
volumes:
  postgres_data:
  pgadmin_data:

# ==========================
# NETWORK
# ==========================
networks:
  bizcore_network:
    driver: bridge